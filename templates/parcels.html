<!DOCTYPE html>
<html>
<head>
    <title>Parcels - Phoenix Parking</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f5f5; }
        h1 { color: #333; }
        .nav a { margin-right: 20px; padding: 10px 20px; background: #007bff; color: white; text-decoration: none; border-radius: 5px; }
        form { margin: 20px 0; }
        select, button { padding: 8px 12px; margin-right: 10px; }
        button { background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; background: white; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #007bff; color: white; }
        tr:hover { background: #f1f1f1; }
    </style>
</head>
<body>
    <h1>Parcel Data</h1>
    <div class="nav">
        <a href="/">Home</a>
        <a href="/meters">View Meters</a>
    </div>
    <form method="get">
        <label>Filter by Property Type:</label>
        <select name="property_type">
            <option value="">All</option>
            <option value="Residential" {% if property_type == 'Residential' %}selected{% endif %}>Residential</option>
            <option value="Commercial" {% if property_type == 'Commercial' %}selected{% endif %}>Commercial</option>
            <option value="Industrial" {% if property_type == 'Industrial' %}selected{% endif %}>Industrial</option>
        </select>
        <button type="submit">Filter</button>
    </form>
    <table>
        <tr>
            <th>APN</th>
            <th>Property Type</th>
            <th>Square Footage</th>
            <th>Estimated Parking Spaces</th>
        </tr>
        {% for p in parcels %}
        <tr>
            <td>{{ p[0] }}</td>
            <td>{{ p[1] }}</td>
            <td>{{ p[2] }}</td>
            <td>{{ p[3] }}</td>
        </tr>
        {% endfor %}
    </table>
</body>
</html>
